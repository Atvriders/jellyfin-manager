<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scan Media Library — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #101010;
    --surface: #1c1c1c;
    --border:  #2e2e2e;
    --accent:  #00a4dc;
    --red:     #e05260;
    --text:    #e8e8e8;
    --muted:   #888;
    --radius:  12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    min-width: 300px;
  }

  input[type="password"] {
    width: 100%;
    background: #151515;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    padding: 0.65rem 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: var(--accent); }

  button[type="submit"] {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.75rem;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s, transform 0.1s;
  }
  button[type="submit"]:hover { opacity: 0.88; }
  button[type="submit"]:active { transform: scale(0.97); }

  .error {
    font-size: 0.82rem;
    color: var(--red);
    text-align: center;
  }

  /* Lockout */
  .lockout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .lockout-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #timer {
    font-size: 2.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--red);
    letter-spacing: 0.04em;
  }

  .lockout-msg {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<h1>Scan Media Library</h1>

<div class="card">
  {% if locked %}
  <div class="lockout">
    <div class="lockout-label">Too many attempts. Try again in</div>
    <div id="timer">--:--:--</div>
    <div class="lockout-msg">This page will unlock automatically.</div>
  </div>
  <script>
    let remaining = {{ locked_seconds }};
    const timerEl = document.getElementById('timer');

    function pad(n) { return String(n).padStart(2, '0'); }
    function fmt(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `${h}:${pad(m)}:${pad(sec)}`;
    }

    timerEl.textContent = fmt(remaining);
    const iv = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(iv);
        location.reload();
      } else {
        timerEl.textContent = fmt(remaining);
      }
    }, 1000);
  </script>

  {% else %}
  <form method="POST" action="/login">
    <div style="display:flex;flex-direction:column;gap:1.25rem;">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" />
      <button type="submit">Enter</button>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </div>
  </form>
  {% endif %}
</div>

</body>
</html>
