<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scan Media Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #101010;
    --surface: #1c1c1c;
    --border:  #2e2e2e;
    --accent:  #00a4dc;
    --green:   #4caf7d;
    --red:     #e05260;
    --text:    #e8e8e8;
    --muted:   #888;
    --radius:  12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.75rem;
    min-width: 300px;
  }

  #scan-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }
  #scan-btn:hover:not(:disabled) { opacity: 0.88; }
  #scan-btn:active:not(:disabled) { transform: scale(0.97); }
  #scan-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #timer-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  #timer-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #timer {
    font-size: 2.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  #timer.done { color: var(--green); }

  #status-msg {
    font-size: 0.8rem;
    color: var(--muted);
    min-height: 1.2em;
    text-align: center;
  }
  #status-msg.error { color: var(--red); }
</style>
</head>
<body>

<h1>Scan Media Library</h1>

<div class="card">
  <button id="scan-btn">Scan Media Library</button>

  <div id="timer-wrap">
    <div id="timer-label">Next scan available in</div>
    <div id="timer">1:00:00</div>
  </div>

  <div id="status-msg"></div>
</div>

<script>
  const COOLDOWN_MS = 60 * 60 * 1000; // 1 hour
  const STORAGE_KEY = 'jf_scan_until';

  const btn       = document.getElementById('scan-btn');
  const timerWrap = document.getElementById('timer-wrap');
  const timerEl   = document.getElementById('timer');
  const statusMsg = document.getElementById('status-msg');

  let tickInterval = null;

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatMs(ms) {
    if (ms <= 0) return '0:00:00';
    const totalSec = Math.ceil(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return `${h}:${pad(m)}:${pad(s)}`;
  }

  function startCooldown(until) {
    btn.disabled = true;
    timerWrap.style.display = 'flex';
    timerEl.classList.remove('done');

    if (tickInterval) clearInterval(tickInterval);

    tickInterval = setInterval(() => {
      const remaining = until - Date.now();
      if (remaining <= 0) {
        clearInterval(tickInterval);
        timerEl.textContent = '0:00:00';
        timerEl.classList.add('done');
        timerWrap.style.display = 'none';
        btn.disabled = false;
        statusMsg.textContent = 'Ready to scan.';
        statusMsg.className = '';
        localStorage.removeItem(STORAGE_KEY);
      } else {
        timerEl.textContent = formatMs(remaining);
      }
    }, 500);
  }

  // Resume timer on page load if cooldown is active
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const until = parseInt(saved, 10);
    if (Date.now() < until) {
      timerEl.textContent = formatMs(until - Date.now());
      startCooldown(until);
    } else {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    statusMsg.textContent = 'Starting scan…';
    statusMsg.className = '';

    try {
      const r = await fetch('/api/scan', { method: 'POST' });
      const d = await r.json();
      if (d.error) throw new Error(d.error);

      statusMsg.textContent = 'Scan started.';
      const until = Date.now() + COOLDOWN_MS;
      localStorage.setItem(STORAGE_KEY, until);
      startCooldown(until);
    } catch (e) {
      statusMsg.textContent = 'Error: ' + e.message;
      statusMsg.className = 'error';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
